<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Contraseñas Seguro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
<canvas id="matrix"></canvas>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            
            <h2 class="text-center mb-4">Gestor de Contraseñas</h2>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title">Generar y Guardar</h5>
                    <form id="form-generar">
                        <div class="mb-3">
                            <label for="servicio" class="form-label">¿Para qué servicio es?</label>
                            <input type="text" class="form-control" id="servicio" placeholder="Ej: GitHub, Netflix, Gmail" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Generar Contraseña Segura</button>
                    </form>

                    <div id="resultado-box" class="alert alert-success mt-3 d-none">
                        <strong>¡Guardado exitoso!</strong> Tu contraseña para <span id="res-servicio"></span> es:<br>
                        <code class="fs-4" id="res-password"></code>
                        <p class="text-muted mb-0 mt-2" style="font-size: 0.85rem;">⚠️ Copiala ahora, en la base de datos está encriptada.</p>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Bóveda de Servicios Registrados</h5>
                    <ul class="list-group list-group-flush" id="lista-servicios">
                        </ul>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // 1. Configuramos la dirección del servidor
    const API_URL = 'http://localhost:3017/api/contrasenas';

    // 2. Función para cargar la lista de servicios apenas abre la página
    async function cargarServicios() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            const lista = document.getElementById('lista-servicios');
            lista.innerHTML = '';

            if (data.datos.length === 0) {
                lista.innerHTML = '<li class="list-group-item text-muted">No hay contraseñas guardadas.</li>';
                return;
            }

            data.datos.forEach(item => {
                lista.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        ${item.servicio}
                        <span class="badge rounded-pill">ID: ${item.id}</span>
                    </li>
                `;
            });
        } catch (error) {
            console.error("Error al cargar servicios:", error);
        }
    }

    // 3. Lógica del botón para GENERAR
    document.getElementById('form-generar').addEventListener('submit', async (e) => {
        e.preventDefault(); // Evita que la página se refresque
        
        const inputServicio = document.getElementById('servicio').value;
        const btn = e.target.querySelector('button');

        try {
            btn.disabled = true; // Desactivamos el botón mientras carga
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ servicio: inputServicio })
            });

            const data = await response.json();

            // Mostramos el resultado en el HTML
            document.getElementById('res-servicio').innerText = data.servicio;
            document.getElementById('res-password').innerText = data.password_generada;
            document.getElementById('resultado-box').classList.remove('d-none');
            
            document.getElementById('servicio').value = ''; // Limpiamos el input
            cargarServicios(); // Recargamos la lista de abajo

        } catch (error) {
            alert("Hubo un error al conectar con la API.");
            console.error(error);
        } finally {
            btn.disabled = false;
        }
    });

    // Ejecutamos la carga inicial
    cargarServicios();

const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

// Ajustar el canvas al tamaño de la ventana
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Caracteres: letras, números y símbolos
const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~ñ";
const fontSize = 16;
const columns = canvas.width / fontSize;

// Array para las posiciones verticales de cada columna
const drops = [];
for (let i = 0; i < columns; i++) {
    drops[i] = 1;
}

function drawMatrix() {
    // Fondo semitransparente para dejar el rastro (estela)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#00ff41'; // Verde Matrix
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < drops.length; i++) {
        // Elegir un caracter aleatorio
        const text = characters.charAt(Math.floor(Math.random() * characters.length));
        
        // Dibujar el caracter
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        // Resetear la gota al azar después de que sale de pantalla
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i]++;
    }
}

// Ejecutar la animación a 30 FPS aproximadamente
setInterval(drawMatrix, 35);


</script>

</body>
</html>
